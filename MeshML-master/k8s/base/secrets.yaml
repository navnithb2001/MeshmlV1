apiVersion: v1
kind: Secret
metadata:
  name: meshml-secrets
  namespace: meshml
type: Opaque
stringData:
  # Database Credentials
  POSTGRES_USER: "meshml_user"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # Redis Password
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # JWT Secret
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION"
  
  # API Keys (if needed)
  # GCP_SERVICE_ACCOUNT_KEY: ""
  # AWS_ACCESS_KEY_ID: ""
  # AWS_SECRET_ACCESS_KEY: ""

---
# Note: In production, use Google Secret Manager instead
# gcloud secrets create meshml-postgres-password --data-file=-
# Then reference in pods using:
# env:
#   - name: POSTGRES_PASSWORD
#     valueFrom:
#       secretKeyRef:
#         name: meshml-secrets
#         key: POSTGRES_PASSWORD
