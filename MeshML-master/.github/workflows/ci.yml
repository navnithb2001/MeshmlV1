name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "services/**"
      - "workers/python-worker/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/**"
      - "workers/python-worker/**"
      - ".github/workflows/ci.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort

      - name: Black check (repo)
        run: black --check .

      - name: isort check (repo)
        run: isort --check-only .

  parallel-tests:
    name: Tests (${{ matrix.component }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - services/api-gateway
          - services/model-registry
          - services/dataset-sharder
          - services/task-orchestrator
          - services/parameter-server
          - services/metrics-service
          - workers/python-worker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi
          pip install -r requirements-test.txt

      - name: Generate proto stubs
        working-directory: ${{ matrix.component }}
        run: |
          if [ -f scripts/generate_protos.py ]; then
            python scripts/generate_protos.py
          fi

      - name: Run pytest
        working-directory: ${{ matrix.component }}
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_HOST: "localhost"
          REDIS_URL: "redis://localhost:6379/0"
          GRPC_TARGET: "localhost:50051"
          DEBUG: "release"
        run: pytest -q

  docker-build-verify:
    needs: parallel-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - model-registry
          - dataset-sharder
          - task-orchestrator
          - parameter-server
          - metrics-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image with cache (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: meshml/${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  protocol-registry:
    needs: docker-build-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate proto contract consistency
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          from pathlib import Path
          import sys

          root = Path(".")
          proto_files = list(root.glob("services/*/proto/*.proto")) + list(
              root.glob("workers/python-worker/proto/*.proto")
          )
          grouped = {}
          for file_path in proto_files:
              grouped.setdefault(file_path.name, []).append(file_path)

          mismatches = []
          for name, paths in sorted(grouped.items()):
              hashes = {}
              for p in paths:
                  digest = hashlib.sha256(p.read_bytes()).hexdigest()
                  hashes.setdefault(digest, []).append(str(p))
              if len(hashes) > 1:
                  mismatches.append((name, hashes))

          if mismatches:
              print("Proto consistency check failed:")
              for name, hashes in mismatches:
                  print(f"\n{name}")
                  for digest, files in hashes.items():
                      print(f"  {digest[:12]}:")
                      for file in files:
                          print(f"    - {file}")
              sys.exit(1)

          print("Proto consistency check passed.")
          PY
