name: Docker Build

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/**'
      - 'infrastructure/docker/Dockerfile.*'
  pull_request:
    branches: [ main ]

jobs:
  build-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - dataset-sharder
          - task-orchestrator
          - parameter-server
          - metrics-service
          - model-registry

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build ${{ matrix.service }}
      uses: docker/build-push-action@v5
      with:
        context: services/${{ matrix.service }}
        file: services/${{ matrix.service }}/Dockerfile
        push: false
        tags: meshml/${{ matrix.service }}:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test image
      run: |
        docker run --rm meshml/${{ matrix.service }}:test python -c "import app; print('OK')"
