apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-service
  namespace: meshml
  labels:
    app: metrics-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metrics-service
  template:
    metadata:
      labels:
        app: metrics-service
    spec:
      containers:
      - name: metrics-service
        image: gcr.io/PROJECT_ID/meshml-metrics-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8005
          name: http
        - containerPort: 50055
          name: grpc
        envFrom:
        - configMapRef:
            name: meshml-config
        - secretRef:
            name: meshml-secrets
        env:
        - name: GRPC_PORT
          value: "50055"
        readinessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 20
          periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: metrics-service
  namespace: meshml
  labels:
    app: metrics-service
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: metrics-service
  ports:
  - port: 8005
    targetPort: 8005
    protocol: TCP
    name: http
  - port: 50055
    targetPort: 50055
    protocol: TCP
    name: grpc
