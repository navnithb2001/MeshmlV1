apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: meshml
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: gcr.io/PROJECT_ID/meshml-api-gateway:latest
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: meshml-config
        - secretRef:
            name: meshml-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: meshml
  labels:
    app: api-gateway
spec:
  type: LoadBalancer
  loadBalancerIP: ${GATEWAY_IP}
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: api-gateway
