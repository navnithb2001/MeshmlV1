apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataset-sharder
  namespace: meshml
  labels:
    app: dataset-sharder
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dataset-sharder
  template:
    metadata:
      labels:
        app: dataset-sharder
    spec:
      containers:
      - name: dataset-sharder
        image: gcr.io/PROJECT_ID/meshml-dataset-sharder:latest
        ports:
        - containerPort: 8001
          name: http
        - containerPort: 50053
          name: grpc
        envFrom:
        - configMapRef:
            name: meshml-config
        - secretRef:
            name: meshml-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: dataset-sharder-service
  namespace: meshml
  labels:
    app: dataset-sharder
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
    name: http
  - port: 50053
    targetPort: 50053
    protocol: TCP
    name: grpc
  selector:
    app: dataset-sharder
