apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-registry
  namespace: meshml
  labels:
    app: model-registry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model-registry
  template:
    metadata:
      labels:
        app: model-registry
    spec:
      containers:
      - name: model-registry
        image: gcr.io/PROJECT_ID/meshml-model-registry:latest
        ports:
        - containerPort: 8004
          name: http
        - containerPort: 50052
          name: grpc
        envFrom:
        - configMapRef:
            name: meshml-config
        - secretRef:
            name: meshml-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: model-registry-service
  namespace: meshml
  labels:
    app: model-registry
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 8004
    targetPort: 8004
    protocol: TCP
    name: http
  - port: 50052
    targetPort: 50052
    protocol: TCP
    name: grpc
  selector:
    app: model-registry
